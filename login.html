<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0f172a">
    <title>CoinLyte Access</title>
    <style>
      :root {
        --ink: #14213d;
        --muted: #64748b;
        --line: #ded6c8;
        --red: #cc3f3f;
        --gold: #d69e2e;
      }
      * { box-sizing: border-box; }
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          linear-gradient(rgba(20, 33, 61, .75), rgba(20, 33, 61, .75)),
          url("https://images.unsplash.com/photo-1611162617474-5b21e879e113?auto=format&fit=crop&w=1600&q=80") center/cover;
      }
      .panel {
        width: min(520px, 100%);
        padding: 34px;
        border-radius: 12px;
        background: rgba(255, 254, 250, .96);
        box-shadow: 0 18px 45px rgba(15, 23, 42, .16);
      }
      .mark {
        width: 58px;
        height: 58px;
        display: grid;
        place-items: center;
        border-radius: 50%;
        background: rgba(255,255,255,.92);
        box-shadow: 0 10px 24px rgba(15,23,42,.18);
        overflow: hidden;
      }
      .mark img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .eyebrow {
        margin: 18px 0 6px;
        color: var(--muted);
        font-size: .74rem;
        font-weight: 800;
        letter-spacing: .08em;
        text-transform: uppercase;
      }
      h1 {
        margin: 0 0 10px;
        font-size: clamp(2.1rem, 8vw, 3.7rem);
        line-height: .95;
      }
      p { color: #475569; line-height: 1.6; }
      form { margin-top: 24px; }
      label { display: block; margin-bottom: 8px; font-weight: 750; }
      .row { display: grid; grid-template-columns: 1fr 1fr auto; gap: 12px; align-items: end; }
      .field { min-width: 0; }
      input {
        min-width: 0;
        padding: 12px 13px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
      }
      button {
        min-height: 44px;
        padding: 0 16px;
        border: 0;
        border-radius: 8px;
        background: var(--gold);
        color: #14110a;
        font: inherit;
        font-weight: 850;
        cursor: pointer;
      }
      .error { min-height: 20px; color: var(--red); font-size: .9rem; }
      @media (max-width: 560px) {
        .row { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <main class="panel">
      <div class="mark"><img src="/assets/brand/coinlyte-logo.png" alt="CoinLyte"></div>
      <p class="eyebrow">CoinLyte OS</p>
      <h1>Command Centre</h1>
      <p>Private access for the YouTube business dashboard.</p>
      <form id="login-form" method="post" action="/api/login">
        <div class="row">
          <div class="field">
            <label for="userId">User ID</label>
            <input id="userId" name="userId" type="text" autocomplete="username" placeholder="User ID" autofocus required>
          </div>
          <div class="field">
            <label for="code">Access code</label>
            <input id="code" name="code" type="password" autocomplete="current-password" placeholder="Access code" required>
          </div>
          <button type="submit">Unlock</button>
        </div>
        <p id="error" class="error" role="alert"></p>
      </form>
    </main>
    <script>
      const params = new URLSearchParams(location.search);
      if (params.get("error")) {
        document.getElementById("error").textContent = "That user ID and access code did not open the dashboard.";
      }
    </script>
  </body>
</html>
